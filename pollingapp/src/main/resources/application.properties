spring.application.name=pollingapp

# DATABASE CONFIGURATION
# template -> [protocol]:[db]://[host-url]/[db-name]
spring.datasource.url=jdbc:mysql://localhost:3306/polling-app
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT CONFIGURATION
# Secret key for signing JWT tokens (minimum 32 characters for HS256)
jwt.secret=${JWT_SECRET}
# Token expiration time: 24 hours in milliseconds
jwt.expiration-ms=86400000

# CORS CONFIGURATION
# Comma-separated list of allowed origins; override via CORS_ALLOWED_ORIGINS env var
# In production behind nginx, CORS is not needed but this stays for direct-API access
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}