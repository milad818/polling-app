# Active only when SPRING_PROFILES_ACTIVE=prod

# --- Database (AWS RDS) ---
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT:3306}/${RDS_DB_NAME:polling-app}
spring.datasource.username=${RDS_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# --- Server ---
server.port=${PORT:8080}

# --- Logging (CloudWatch-friendly JSON) ---
logging.pattern.console=%d{ISO8601} %level [%thread] %logger{36} - %msg%n
logging.level.root=INFO
logging.level.org.polling=INFO
logging.level.org.flywaydb=INFO
