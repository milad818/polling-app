name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Backend: format → lint → test
  # ---------------------------------------------------------------------------
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pollingapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Format check (Spotless)
        run: ./mvnw spotless:check -B --no-transfer-progress

      - name: Lint (Checkstyle)
        run: ./mvnw checkstyle:check -B --no-transfer-progress

      - name: Unit tests
        run: ./mvnw test -B --no-transfer-progress

  # ---------------------------------------------------------------------------
  # Frontend: format → lint → type-check → test → build
  # ---------------------------------------------------------------------------
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pollingapp-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: pollingapp-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npm run type-check

      - name: Unit tests (Vitest)
        run: npx ng test --watch=false

      - name: Production build
        run: npm run build -- --configuration production

  # ---------------------------------------------------------------------------
  # Deploy: build Docker images → push to ECR → deploy to EC2
  # Runs only on push to main, after both CI jobs pass.
  # ---------------------------------------------------------------------------
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: |
      github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/feat/production-backend-setup'
      )

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO: ${{ secrets.ECR_BACKEND_REPO }}
          SHA: ${{ github.sha }}
        run: |
          docker build --target production \
            -t $REGISTRY/$REPO:$SHA \
            -t $REGISTRY/$REPO:latest \
            ./pollingapp
          docker push $REGISTRY/$REPO:$SHA
          docker push $REGISTRY/$REPO:latest

      - name: Build & push frontend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO: ${{ secrets.ECR_FRONTEND_REPO }}
          SHA: ${{ github.sha }}
        run: |
          docker build --target production \
            -t $REGISTRY/$REPO:$SHA \
            -t $REGISTRY/$REPO:latest \
            ./pollingapp-client
          docker push $REGISTRY/$REPO:$SHA
          docker push $REGISTRY/$REPO:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
          FRONTEND_REPO: ${{ secrets.ECR_FRONTEND_REPO }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REGISTRY,BACKEND_REPO,FRONTEND_REPO,AWS_REGION,IMAGE_TAG,DEPLOY_BRANCH
          script: |
            cd ~/polling-app
            git pull origin $DEPLOY_BRANCH
            AWS_REGION=$AWS_REGION bash scripts/fetch-secrets.sh
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $REGISTRY
            export BACKEND_IMAGE=$REGISTRY/$BACKEND_REPO:$IMAGE_TAG
            export FRONTEND_IMAGE=$REGISTRY/$FRONTEND_REPO:$IMAGE_TAG
            docker compose pull backend frontend
            docker compose up -d --no-build
            docker image prune -f
