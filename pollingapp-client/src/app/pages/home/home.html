<!-- ===== SIDEBAR ===== -->
<app-sidebar
  (sectionChange)="onSectionChange($event)"
  (collapsedChange)="onCollapsedChange($event)">
</app-sidebar>

<!-- ===== MAIN AREA ===== -->
<div class="home-main" [class.sidebar-collapsed]="sidebarCollapsed">

  <!-- Header -->
  <div class="app-header">
    <div class="header-content">
      <h1 class="fancy-title">Polling App</h1>
      <p class="header-subtitle">{{ sectionTitle }}</p>
    </div>
  </div>

  <!-- Body -->
  <div class="home-content" [class.full-width]="!showProfileColumn">

    <!-- Profile-only view (Account > Profile) -->
    @if (showOnlyProfile) {
      <div class="profile-only-wrapper">
        <app-profile></app-profile>
      </div>
    }

    <!-- Poll / Placeholder column -->
    @if (!showOnlyProfile) {
      <div class="poll-column">

        @if (showPollComponent) {
          <app-poll [view]="activeView" [showCreate]="activeSection === 'dashboard'"></app-poll>
        }

        @if (showComingSoon) {
          <div class="coming-soon-card">
            <div class="coming-soon-icon">
              <i class="fas fa-tools"></i>
            </div>
            <h2 class="coming-soon-title">{{ sectionTitle }}</h2>
            <p class="coming-soon-subtitle">This feature is under development. Check back soon!</p>
          </div>
        }

      </div>
    }

    <!-- Profile column (Dashboard only) -->
    @if (showProfileColumn) {
      <div class="profile-column">
        <div class="profile-actions">
          <span class="welcome-greeting">{{ welcomeMessage }}</span>
        </div>
        <app-profile></app-profile>
      </div>
    }

  </div>
</div>
