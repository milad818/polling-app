<aside class="sidebar" [class.collapsed]="isCollapsed">
  <!-- ===== TOGGLE BUTTON ===== -->
  <button class="sidebar-toggle" (click)="toggle()" title="{{ isCollapsed ? 'Expand sidebar' : 'Collapse sidebar' }}">
    <i class="fas" [class.fa-bars]="isCollapsed" [class.fa-times]="!isCollapsed"></i>
  </button>

  <!-- ===== LOGO ===== -->
  <div class="sidebar-logo">
    <span class="logo-icon"><i class="fas fa-poll-h"></i></span>
    <span class="logo-text">PollApp</span>
  </div>

  <!-- ===== NAVIGATION ===== -->
  <nav class="sidebar-nav">

    <!-- Dashboard -->
    <div
      class="nav-item"
      role="button"
      tabindex="0"
      [class.active]="activeSection === 'dashboard'"
      (click)="selectSection('dashboard')"
      (keydown.enter)="selectSection('dashboard')"
      (keydown.space)="$event.preventDefault(); selectSection('dashboard')"
      title="Dashboard"
    >
      <span class="nav-icon"><i class="fas fa-home"></i></span>
      <span class="nav-label">Dashboard</span>
    </div>

    <!-- ===== POLLS GROUP ===== -->
    <div class="nav-group">
      <div
        class="nav-group-header"
        role="button"
        tabindex="0"
        [class.open]="expandedGroups.has('polls')"
        (click)="toggleGroup('polls')"
        (keydown.enter)="toggleGroup('polls')"
        (keydown.space)="$event.preventDefault(); toggleGroup('polls')"
        title="Polls"
      >
        <span class="nav-icon"><i class="fas fa-chart-bar"></i></span>
        <span class="nav-label">Polls</span>
        <i class="fas fa-chevron-down group-arrow" [class.rotated]="isGroupExpanded('polls')"></i>
      </div>

      <div class="nav-group-children" [class.expanded]="isGroupExpanded('polls')">
        <div
          class="nav-item child"
          role="button"
          tabindex="0"
          [class.active]="activeSection === 'all-polls'"
          (click)="selectSection('all-polls')"
          (keydown.enter)="selectSection('all-polls')"
          (keydown.space)="$event.preventDefault(); selectSection('all-polls')"
          title="All Polls"
        >
          <span class="nav-icon"><i class="fas fa-list-ul"></i></span>
          <span class="nav-label">All Polls</span>
        </div>
        <div
          class="nav-item child"
          role="button"
          tabindex="0"
          [class.active]="activeSection === 'my-polls'"
          (click)="selectSection('my-polls')"
          (keydown.enter)="selectSection('my-polls')"
          (keydown.space)="$event.preventDefault(); selectSection('my-polls')"
          title="My Polls"
        >
          <span class="nav-icon"><i class="fas fa-user-edit"></i></span>
          <span class="nav-label">My Polls</span>
        </div>
        <div
          class="nav-item child"
          role="button"
          tabindex="0"
          [class.active]="activeSection === 'saved-polls'"
          (click)="selectSection('saved-polls')"
          (keydown.enter)="selectSection('saved-polls')"
          (keydown.space)="$event.preventDefault(); selectSection('saved-polls')"
          title="Saved Polls"
        >
          <span class="nav-icon"><i class="fas fa-bookmark"></i></span>
          <span class="nav-label">Saved Polls</span>
        </div>
      </div>
    </div>

    <!-- ===== INSIGHTS GROUP ===== -->
    <div class="nav-group">
      <div
        class="nav-group-header"
        role="button"
        tabindex="0"
        [class.open]="expandedGroups.has('insights')"
        (click)="toggleGroup('insights')"
        (keydown.enter)="toggleGroup('insights')"
        (keydown.space)="$event.preventDefault(); toggleGroup('insights')"
        title="Insights"
      >
        <span class="nav-icon"><i class="fas fa-lightbulb"></i></span>
        <span class="nav-label">Insights</span>
        <i class="fas fa-chevron-down group-arrow" [class.rotated]="isGroupExpanded('insights')"></i>
      </div>

      <div class="nav-group-children" [class.expanded]="isGroupExpanded('insights')">
        <div
          class="nav-item child"
          role="button"
          tabindex="0"
          [class.active]="activeSection === 'analytics'"
          (click)="selectSection('analytics')"
          (keydown.enter)="selectSection('analytics')"
          (keydown.space)="$event.preventDefault(); selectSection('analytics')"
          title="Analytics"
        >
          <span class="nav-icon"><i class="fas fa-chart-line"></i></span>
          <span class="nav-label">Analytics</span>
        </div>
        <div
          class="nav-item child"
          role="button"
          tabindex="0"
          [class.active]="activeSection === 'reports'"
          (click)="selectSection('reports')"
          (keydown.enter)="selectSection('reports')"
          (keydown.space)="$event.preventDefault(); selectSection('reports')"
          title="Reports"
        >
          <span class="nav-icon"><i class="fas fa-file-alt"></i></span>
          <span class="nav-label">Reports</span>
        </div>
      </div>
    </div>

    <!-- ===== ACCOUNT GROUP ===== -->
    <div class="nav-group">
      <div
        class="nav-group-header"
        role="button"
        tabindex="0"
        [class.open]="expandedGroups.has('account')"
        (click)="toggleGroup('account')"
        (keydown.enter)="toggleGroup('account')"
        (keydown.space)="$event.preventDefault(); toggleGroup('account')"
        title="Account"
      >
        <span class="nav-icon"><i class="fas fa-user-circle"></i></span>
        <span class="nav-label">Account</span>
        <i class="fas fa-chevron-down group-arrow" [class.rotated]="isGroupExpanded('account')"></i>
      </div>

      <div class="nav-group-children" [class.expanded]="isGroupExpanded('account')">
        <div
          class="nav-item child"
          role="button"
          tabindex="0"
          [class.active]="activeSection === 'profile'"
          (click)="selectSection('profile')"
          (keydown.enter)="selectSection('profile')"
          (keydown.space)="$event.preventDefault(); selectSection('profile')"
          title="Profile"
        >
          <span class="nav-icon"><i class="fas fa-id-card"></i></span>
          <span class="nav-label">Profile</span>
        </div>
        <div
          class="nav-item child"
          role="button"
          tabindex="0"
          [class.active]="activeSection === 'settings'"
          (click)="selectSection('settings')"
          (keydown.enter)="selectSection('settings')"
          (keydown.space)="$event.preventDefault(); selectSection('settings')"
          title="Settings"
        >
          <span class="nav-icon"><i class="fas fa-cog"></i></span>
          <span class="nav-label">Settings</span>
        </div>
        <div
          class="nav-item child logout-item"
          role="button"
          tabindex="0"
          (click)="onLogout()"
          (keydown.enter)="onLogout()"
          (keydown.space)="$event.preventDefault(); onLogout()"
          title="Logout"
        >
          <span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span>
          <span class="nav-label">Logout</span>
        </div>
      </div>
    </div>

  </nav>

  <!-- ===== FOOTER ===== -->
  <div class="sidebar-footer">
    <span class="nav-icon"><i class="fas fa-info-circle"></i></span>
    <span class="nav-label">v1.0.0</span>
  </div>
</aside>
