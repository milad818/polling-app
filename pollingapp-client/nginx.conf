server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static file serving ───────────────────────────────────────────────────
    # Tries the exact file, then the path as a directory, then falls back to
    # index.html.  The fallback is what makes Angular's client-side router work:
    # when a user refreshes on /polls/42, nginx returns index.html and Angular
    # boots up and handles the route itself (instead of nginx returning 404).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # Any request starting with /api/ is forwarded to the Spring Boot backend
    # container (reachable as "backend" via Docker's internal DNS on port 8080).
    # Because this forwarding happens server-to-server (nginx → Spring Boot),
    # the browser never makes a cross-origin request – CORS headers are not
    # required in production.
    #
    # proxy_pass ends with a slash:
    #   /api/polls  →  http://backend:8080/api/polls  ✓
    # (nginx preserves the full path when proxy_pass contains a path segment)
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        # Preserve original host and connection headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Prevent nginx from caching API responses
        proxy_no_cache               1;
        proxy_cache_bypass           1;
        add_header Cache-Control     "no-store";
    }

    # ── Cache static assets aggressively ─────────────────────────────────────
    # Angular adds a content hash to every compiled file name (main.abc123.js),
    # so it is safe to cache them for a long time.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
